{% extends "base.html" %}
{% block title %}Mi Perfil · LUMEN{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-4" style="color:#1A3C6E; font-weight:700;"><i class="fa fa-user me-2"></i>Mi Perfil</h4>

    <div class="card mb-4">
      <div class="card-header-lumen"><h5>Datos Personales</h5></div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="action" value="update">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre Completo</label>
            <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ user.email or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
          </div>
          <button type="submit" class="btn btn-lumen">Guardar Cambios</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header-lumen"><h5>Cambiar Contraseña</h5></div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="action" value="password">
          <div class="mb-3">
            <label class="form-label fw-semibold">Contraseña Actual</label>
            <input type="password" name="old_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Nueva Contraseña</label>
            <input type="password" name="new_password" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-outline-primary">Cambiar Contraseña</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

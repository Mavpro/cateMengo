<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMEN · Ingreso</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #1A3C6E; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .brand { font-size: 2rem; font-weight: 800; color: #1A3C6E; letter-spacing: 2px; }
  .brand span { color: #C8A84B; }
  .dorado-line { height: 3px; background: #C8A84B; border: none; opacity: 1; margin: 16px 0 24px; }
  .btn-login { background: #1A3C6E; color: white; border: none; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 8px; width: 100%; }
  .btn-login:hover { background: #2563AB; color: white; }
  .form-control:focus { border-color: #1A3C6E; box-shadow: 0 0 0 3px rgba(26,60,110,0.15); }
  .form-label { font-weight: 600; color: #2C3E50; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center">
    <div class="brand">LUMEN <span>·</span></div>
    <div class="text-muted" style="font-size:0.85rem;">Propiedades & Negocios Rurales</div>
    <hr class="dorado-line">
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-danger py-2 mb-3" style="font-size:0.9rem;">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input type="text" name="username" class="form-control" required autofocus placeholder="Tu usuario">
    </div>
    <div class="mb-4">
      <label class="form-label">Contraseña</label>
      <input type="password" name="password" class="form-control" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-login">Ingresar</button>
  </form>
  <div class="text-center mt-3 text-muted" style="font-size:0.8rem;">Sistema de Tasación Inmobiliaria</div>
</div>
</body>
</html>
